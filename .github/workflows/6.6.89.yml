name: Build_oneplus_sm8750 Droidspaces
permissions:
  contents: write
  actions: write
on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: "📝请选择要集成的KSU："
        required: true
        type: choice
        options:
          - 'ReSukiSU'
          - 'SukiSU-Ultra'
        default: 'ReSukiSU'

      device_name:
        description: "📝请选择要编译的机型："
        required: true
        type: choice
        options:
          - 'oneplus_13'
          - 'oneplus_ace5_pro'
          - 'oneplus_ace_6'
          - 'oneplus_13t'
          - 'oneplus_pad_2_pro'
          - 'oneplus_ace5_ultra'
          - 'realme_GT7'
          - 'realme_GT7pro'
          - 'realme_GT7pro_Speed'
          - 'realme_GT8'
        default: 'oneplus_ace5_pro'

      custom_kernel_suffix:
        description: "✏️ 自定义内核名称- (-开头 留空则默认官方）"
        required: false
        default: ''

      custom_kernel_time:
        description: "⏰ 自定义构建时间- (英文时间字符串格式 留空则默认官方）"
        required: false
        default: ''

      enable_susfs:
        description: "启用SUSFS"
        required: true
        default: true
        type: boolean

      enable_ReKernel:
        description: "添加Re-Kernel支持"
        required: true
        default: false
        type: boolean

      enable_Adios:
        description: "添加ADIOS IO调度器支持"
        required: true
        default: true
        type: boolean

      enable_scx:
        description: "添加完美风驰"
        required: true
        default: true
        type: boolean

      enable_bbg:
        description: "开启BBG基带守护"
        required: true
        default: true
        type: boolean

      enable_droidspaces:
        description: "启用 Droidspaces 支持"
        required: true
        default: false
        type: boolean

jobs:
  build:
    name: Build_${{ github.event.inputs.device_name }}_${{ github.event.inputs.ksu_type }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      KSU_TYPE:               ${{ github.event.inputs.ksu_type }}
      DEVICES_NAME:           ${{ github.event.inputs.device_name }}
      CUSTOM_KERNEL_SUFFIX:   ${{ github.event.inputs.custom_kernel_suffix }}
      CUSTOM_KERNEL_TIME:     ${{ github.event.inputs.custom_kernel_time }}
      ENABLE_SUSFS:           ${{ github.event.inputs.enable_susfs }}
      ENABLE_REKERNEL:        ${{ github.event.inputs.enable_ReKernel }}
      ENABLE_ADIOS:           ${{ github.event.inputs.enable_Adios }}
      ENABLE_SCX:             ${{ github.event.inputs.enable_scx }}
      ENABLE_BBG:             ${{ github.event.inputs.enable_bbg }}
      ENABLE_DROIDSPACES:     ${{ github.event.inputs.enable_droidspaces }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: ⚙️ Set REPO_MANIFEST (设置对应机型配置文件)
        run: |
          case "${{ env.DEVICES_NAME }}" in
            oneplus_ace5_pro)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_oneplus_ace5_pro" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace5_pro_b" >> $GITHUB_ENV ;;
            oneplus_13)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_oneplus_13" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_13_b" >> $GITHUB_ENV ;;
            oneplus_ace_6)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_ace_6" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace_6" >> $GITHUB_ENV ;;
            oneplus_13t)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_oneplus_13t" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_13t_b" >> $GITHUB_ENV ;;
            oneplus_pad_2_pro)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_pad_2_pro" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_pad_2_pro_b" >> $GITHUB_ENV ;;
            oneplus_ace5_ultra)
              echo "REPO_MANIFEST=mt6991_b_16.0.0_oneplus_ace5_ultra" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace5_ultra_b" >> $GITHUB_ENV ;;
            realme_GT7)
              echo "REPO_MANIFEST=mt6991_b_16.0.0_oneplus_ace5_ultra" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace5_ultra_b" >> $GITHUB_ENV ;;
            realme_GT7pro)
              echo "IMAGENAME=Image_Rm_GT_7_Pro" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace_6" >> $GITHUB_ENV ;;
            realme_GT7pro_Speed)
              echo "IMAGENAME=Image_Rm_GT_7_Pro_Speed" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace_6" >> $GITHUB_ENV ;;
            realme_GT8)
              echo "IMAGENAME=Image_Rm_GT_8" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace_6" >> $GITHUB_ENV ;;
          esac
          if [ -z "${{ github.event.inputs.custom_kernel_suffix }}" ]; then
            case "${{ env.DEVICES_NAME }}" in
             oneplus_pad_2_pro) DEFAULT_SUFFIX='-android15-8-g096cdb6ecefc-ab14358676-4k' ;;
             oneplus_ace5_ultra) DEFAULT_SUFFIX='-android15-8-ge6068c2aa11d-abogki454747580-4k' ;;
             oneplus_13 | oneplus_13t | oneplus_ace5_pro | oneplus_ace_6 | realme_GT7 | realme_GT7pro_Speed | realme_GT8) DEFAULT_SUFFIX='-android15-8-g7e1f3c083cc6-abogki467167594-4k' ;;
             realme_GT7pro) DEFAULT_SUFFIX='-android15-8-gf4dc45704e54-abogki446052083-4k' ;;
            esac
            echo "DEFAULT_SUFFIX=$DEFAULT_SUFFIX" >> $GITHUB_ENV
            echo "使用原官核名称：$DEFAULT_SUFFIX"
          else
            if [[ "${{ github.event.inputs.custom_kernel_suffix }}" != -* ]]; then
              echo "::warning::自定义内核名称请以 - 开头"
            fi
            echo "使用自定义名称: ${{ github.event.inputs.custom_kernel_suffix }}"
            echo "DEFAULT_SUFFIX=${{ github.event.inputs.custom_kernel_suffix }}" >> $GITHUB_ENV
          fi
          if [ -z "${{ github.event.inputs.custom_kernel_time }}" ]; then
            case "${{ env.DEVICES_NAME }}" in
              oneplus_pad_2_pro) KERNEL_TIME='Tue Oct 28 09:04:21 UTC 2025' ;;
              oneplus_ace5_ultra) KERNEL_TIME='Tue Jul 1 19:48:18 UTC 2025' ;;
              oneplus_13 | oneplus_13t | oneplus_ace5_pro | oneplus_ace_6 | realme_GT7 | realme_GT7pro_Speed | realme_GT8) KERNEL_TIME='Mon Dec 8 04:00:43 UTC 2025' ;;
              realme_GT7pro) KERNEL_TIME='Fri Sep 19 06:13:40 UTC 2025' ;;
            esac
            echo "KERNEL_TIME=$KERNEL_TIME" >> $GITHUB_ENV
            echo "使用官核时间：$KERNEL_TIME"
          else
            echo "使用自定义构建时间: ${{ github.event.inputs.custom_kernel_time }}"
            echo "KERNEL_TIME=${{ github.event.inputs.custom_kernel_time }}" >> $GITHUB_ENV
          fi

      - name: 🛠 Install dependencies and Initialize repo and sync
        run: |
          rm -rf kernel_workspace
          mkdir kernel_workspace
          cd kernel_workspace
          sudo apt-mark hold firefox && sudo apt-mark hold libc-bin && sudo apt purge man-db && sudo rm -rf /var/lib/man-db/auto-update && sudo apt update && sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev dos2unix p7zip-full zstd &
          wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/lib/ccache-x86-64 -O ccache && sudo cp -f ./ccache /usr/bin/ccache && sudo chmod +x /usr/bin/ccache && rm -f ./ccache &
          echo "正在克隆源码仓库..."
          if [ "${DEVICES_NAME}" = "realme_GT7pro" ] || [ "${DEVICES_NAME}" = "realme_GT7pro_Speed" ] || [ "${DEVICES_NAME}" = "realme_GT8" ]; then
            aria2c -s16 -x16 -k1M https://github.com/realme-kernel-opensource/realme_GT8-AndroidB-common-source/archive/refs/heads/master.zip -o common.zip && unzip -q common.zip && mv realme_GT8-AndroidB-common-source-master common
          elif [ "${DEVICES_NAME}" = "oneplus_ace5_ultra" ] || [ "${DEVICES_NAME}" = "realme_GT7" ]; then
            aria2c -s16 -x16 -k1M https://github.com/OnePlusOSS/android_kernel_oneplus_mt6991/archive/refs/heads/oneplus/${REPO_MANIFEST}.zip -o common.zip && unzip -q common.zip && mv android_kernel_oneplus_mt6991-oneplus-${REPO_MANIFEST} common
          else
            aria2c -s16 -x16 -k1M https://github.com/OnePlusOSS/android_kernel_common_oneplus_sm8750/archive/refs/heads/oneplus/${REPO_MANIFEST}.zip -o common.zip && unzip -q common.zip && mv android_kernel_common_oneplus_sm8750-oneplus-${REPO_MANIFEST} common
          fi
          rm -rf common.zip
          mkdir -p clang18 && aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/clang-r510928.zip -o clang.zip && unzip -q clang.zip -d clang18 && rm -rf clang.zip &
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip -o build-tools.zip && unzip -q build-tools.zip && rm -rf build-tools.zip &
          wait
          echo "所有源码及工具链初始化完成！"
          rm common/android/abi_gki_protected_exports_* || true
          for f in common/scripts/setlocalversion; do sed -i 's/ -dirty//g' "$f"; sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"; done

      - name: 🛠 Set ccache DIR
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_${{ env.KSU_TYPE }}_${{ env.DEVICES_NAME }}" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=10G" >> $GITHUB_ENV
          df -h

      - name: 📥 Restore ccache
        id: ccache-restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-ECS-${{ env.KSU_TYPE }}-${{ env.DEVICES_NAME }}-latest
          restore-keys: ccache-ECS-${{ env.KSU_TYPE }}-${{ env.DEVICES_NAME }}-

      - name: 🔎 Find public ccache in releases
        id: public-ccache
        if: ${{ steps.ccache-restore.outputs.cache-matched-key == '' }}
        uses: actions/github-script@v8
        env:
          PUBLIC_CACHE_REPO: ${{ vars.PUBLIC_CACHE_REPO }}
          PUBLIC_CACHE_TAG: ${{ vars.PUBLIC_CACHE_TAG }}
          DEVICE_NAME: ${{ env.DEVICES_NAME }}
        with:
          script: |
            const repoName = process.env.PUBLIC_CACHE_REPO || 'showdo/Public_Ccache';
            const releaseTag = process.env.PUBLIC_CACHE_TAG || 'exported-ccaches';
            const [owner, repo] = repoName.split('/');
            const deviceName = process.env.DEVICE_NAME;
            let selected = null;
            const escapeRegex = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const exactAssetName = `ccache-${deviceName}.tar.zst`;
            const legacyAssetPattern = new RegExp(`^ccache-(.+-)?${escapeRegex(deviceName)}(-[0-9]+)?\\.tar\\.zst$`);
            let release;
            try {
              const response = await github.rest.repos.getReleaseByTag({ owner, repo, tag: releaseTag });
              release = response.data;
            } catch (error) {
              core.info(`未找到公共缓存 release: ${releaseTag}`);
              return;
            }
            for (const asset of release.assets || []) {
              const isExactMatch = asset.name === exactAssetName;
              const isLegacyMatch = legacyAssetPattern.test(asset.name);
              if (isExactMatch || isLegacyMatch) {
                const shouldReplace = !selected || (isExactMatch && !selected.exact) || (isExactMatch === selected.exact && new Date(asset.updated_at) > new Date(selected.updated_at));
                if (shouldReplace) {
                  selected = { name: asset.name, updated_at: asset.updated_at, tag: release.tag_name, repo: `${owner}/${repo}`, exact: isExactMatch };
                }
              }
            }
            if (!selected) {
              core.info('未找到可用的公共 ccache 资产');
              return;
            }
            core.setOutput('asset-name', selected.name);
            core.setOutput('release-tag', selected.tag);
            core.setOutput('source-repo', selected.repo);

      - name: 📦 Restore public ccache from releases
        if: ${{ steps.ccache-restore.outputs.cache-matched-key == '' && steps.public-ccache.outputs.asset-name != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLIC_CACHE_REPO: ${{ steps.public-ccache.outputs.source-repo }}
          PUBLIC_CACHE_TAG: ${{ steps.public-ccache.outputs.release-tag }}
          PUBLIC_CACHE_ASSET: ${{ steps.public-ccache.outputs.asset-name }}
        run: |
          set -euo pipefail
          rm -rf "$CCACHE_DIR"
          gh release download "$PUBLIC_CACHE_TAG" --repo "$PUBLIC_CACHE_REPO" --pattern "$PUBLIC_CACHE_ASSET" --dir .
          TEMP_EXTRACT_DIR="$(mktemp -d)"
          tar --use-compress-program=unzstd -xf "$PUBLIC_CACHE_ASSET" -C "$TEMP_EXTRACT_DIR"
          EXTRACTED_CCACHE_DIR="$(find "$TEMP_EXTRACT_DIR" -maxdepth 1 -mindepth 1 -type d -name '.ccache_*' | head -n 1)"
          mkdir -p "$CCACHE_DIR"
          shopt -s dotglob nullglob
          mv "$EXTRACTED_CCACHE_DIR"/* "$CCACHE_DIR"/
          shopt -u dotglob nullglob
          rm -rf "$TEMP_EXTRACT_DIR"
          echo "PUBLIC_CCACHE_USED=true" >> "$GITHUB_ENV"

      - name: 📥 Init ccache
        run: |
          export CCACHE_DIR="${{ env.CCACHE_DIR }}" CCACHE_MAXSIZE="${{ env.CCACHE_MAXSIZE }}"
          mkdir -p "$CCACHE_DIR"
          ccache -M "$CCACHE_MAXSIZE"
          ccache -o compression=true
          ccache -s

      - name: 🔧 Add Re-Kernel Support
        if: ${{ env.ENABLE_REKERNEL == 'true' }}
        run: |
          cd kernel_workspace
          VERSION=$(awk -F'=' '/^VERSION[ \t]*=/ {gsub(/ /,"",$2); print $2}' common/Makefile)
          PATCHLEVEL=$(awk -F'=' '/^PATCHLEVEL[ \t]*=/ {gsub(/ /,"",$2); print $2}' common/Makefile)
          [ ! -d "Re-Kernel" ] && git clone --depth 1 https://github.com/Sakion-Team/Re-Kernel.git
          RE_DIR="${GITHUB_WORKSPACE}/kernel_workspace/Re-Kernel/LKM-Source"
          cd common
          grep -q 'source "drivers/rekernel/Kconfig"' drivers/Kconfig || sed -i '/endmenu/i source "drivers/rekernel/Kconfig"' drivers/Kconfig
          grep -q 'obj-$(CONFIG_REKERNEL)' drivers/Makefile || printf '\n# Re-Kernel\nobj-$(CONFIG_REKERNEL) += rekernel/\n' >> drivers/Makefile
          mkdir -p drivers/rekernel
          cp ${RE_DIR}/* drivers/rekernel/
          TARGET="KERNEL_${VERSION}_${PATCHLEVEL}"
          if grep -q "$TARGET" drivers/rekernel/rekernel.h; then
            sed -i "s|^[[:space:]]*//[[:space:]]*#define[[:space:]]\+$TARGET|#define $TARGET|" drivers/rekernel/rekernel.h
            echo "CONFIG_REKERNEL=m" >> arch/arm64/configs/gki_defconfig
            echo "CONFIG_REKERNEL_NETWORK=y" >> arch/arm64/configs/gki_defconfig
          else
            echo "⚠️ 不支持的内核版本: $TARGET"
          fi

      - name: 🔧 Add adios_ioscheduler
        if: ${{ env.ENABLE_ADIOS == 'true' }}
        working-directory: kernel_workspace/common
        run: |
          PATCH_FILE="${GITHUB_WORKSPACE}/.github/workflows/tools/adios_ioscheduler_6.6.patch"
          [ ! -f "$PATCH_FILE" ] && exit 1
          if [ ! -f "block/adios.c" ]; then
            cp "$PATCH_FILE" ./adios_ioscheduler_6.6.patch
            patch -p1 --ignore-whitespace -F 3 < adios_ioscheduler_6.6.patch || patch -p1 --force --ignore-whitespace < adios_ioscheduler_6.6.patch || true
            rm -f adios_ioscheduler_6.6.patch
          fi
          grep -q "CONFIG_MQ_IOSCHED_ADIOS" arch/arm64/configs/gki_defconfig || {
            echo "CONFIG_MQ_IOSCHED_ADIOS=y" >> arch/arm64/configs/gki_defconfig
            echo "CONFIG_MQ_IOSCHED_DEFAULT_ADIOS=y" >> arch/arm64/configs/gki_defconfig
          }

      # ========== Droidspaces 手动适配 (使用内联 Python) ==========
      - name: 🔧 Add Droidspaces Support (手动适配)
        if: ${{ env.ENABLE_DROIDSPACES == 'true' }}
        working-directory: kernel_workspace/common
        run: |
          echo "开始添加 Droidspaces 支持..."
          CONFIGS=(CONFIG_SYSVIPC=y CONFIG_POSIX_MQUEUE=y CONFIG_IPC_NS=y CONFIG_PID_NS=y CONFIG_DEVTMPFS=y CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y CONFIG_NETFILTER_XT_TARGET_REJECT=y CONFIG_NETFILTER_XT_TARGET_LOG=y CONFIG_NETFILTER_XT_MATCH_RECENT=y CONFIG_IP_SET=y CONFIG_IP_SET_HASH_IP=y CONFIG_IP_SET_HASH_NET=y CONFIG_NETFILTER_XT_SET=y)
          for cfg in "${CONFIGS[@]}"; do key="${cfg%%=*}"; grep -q "^${key}=" arch/arm64/configs/gki_defconfig || echo "$cfg" >> arch/arm64/configs/gki_defconfig; done

          python3 -c "
import re

with open('include/linux/sched.h', 'r') as f:
    content = f.read()

lines = content.split('\n')
new_lines = []
in_block = False
for line in lines:
    if line.strip().startswith('#ifdef CONFIG_SYSVIPC'):
        in_block = True
    elif in_block and line.strip().startswith('#endif'):
        in_block = False
    if in_block and ('sysvsem' in line or 'sysvshm' in line):
        leading = line[:len(line) - len(line.lstrip())]
        new_lines.append(leading + '//' + line.lstrip())
    else:
        new_lines.append(line)
content = '\n'.join(new_lines)

pattern = r'(ANDROID_KABI_RESERVE\(1\);\s*\n\s*ANDROID_KABI_RESERVE\(2\);\s*\n\s*ANDROID_KABI_RESERVE\(3\);)'
replacement = (
    '#ifdef CONFIG_SYSVIPC\n'
    '\tANDROID_KABI_USE(1, struct sysv_sem sysvsem);\n'
    '\t_ANDROID_KABI_REPLACE(ANDROID_KABI_RESERVE(2); ANDROID_KABI_RESERVE(3), struct sysv_shm sysvshm);\n'
    '#else\n'
    '\tANDROID_KABI_RESERVE(1);\n'
    '\tANDROID_KABI_RESERVE(2);\n'
    '\tANDROID_KABI_RESERVE(3);\n'
    '#endif'
)
content = re.sub(pattern, replacement, content)

with open('include/linux/sched.h', 'w') as f:
    f.write(content)

print('sched.h Droidspaces 适配完成')
"
          echo "✓ Droidspaces 支持配置完成"

      - name: 🔧 apply lz4 & zstd patches
        run: |
          cd kernel_workspace
          git clone https://github.com/cctv18/oppo_oplus_realme_sm8750.git
          cp ./oppo_oplus_realme_sm8750/zram_patch/001-lz4.patch ./common
          cp ./oppo_oplus_realme_sm8750/zram_patch/lz4armv8.S ./common/lib
          cp ./oppo_oplus_realme_sm8750/zram_patch/002-zstd.patch ./common/
          cd ./common
          git apply -p1 < 001-lz4.patch || true
          patch -p1 < 002-zstd.patch || true

      - name: 🔧 Set Baseband-guard
        if: ${{ env.ENABLE_BBG == 'true' }}
        run: |
          cd kernel_workspace
          wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          echo "CONFIG_BBG=y" >> ./common/arch/arm64/configs/gki_defconfig
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/lockdown/lockdown,baseband_guard/ } }' ./common/security/Kconfig

      - name: ⚙️ Set KSU
        run: |
          cd kernel_workspace
          if [ "${{ env.KSU_TYPE }}" == 'ReSukiSU' ]; then
            curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main
            cd ./KernelSU
            KSU_VERSION=$(expr $(git rev-list --count main) + 30700 2>/dev/null || echo 114514)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          else
            curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s builtin
            cd ./KernelSU
            GIT_COMMIT_HASH=$(git rev-parse --short=8 HEAD)
            KSU_API_VERSION="4.1.0"
            VERSION_DEFINITIONS=$'define get_ksu_version_full\nv\\$1-'"$GIT_COMMIT_HASH"$'-TG@qdykernel\nendef\n\nKSU_VERSION_API := '"$KSU_API_VERSION"$'\nKSU_VERSION_FULL := v'"$KSU_API_VERSION"$'-'"$GIT_COMMIT_HASH"$'-TG@qdykernel'
            sed -i '/define get_ksu_version_full/,/endef/d' kernel/Makefile
            sed -i '/KSU_VERSION_API :=/d' kernel/Makefile
            sed -i '/KSU_VERSION_FULL :=/d' kernel/Makefile
            awk -v def="$VERSION_DEFINITIONS" '/REPO_OWNER :=/ {print; print def; inserted=1; next} 1 END {if (!inserted) print def}' kernel/Makefile > kernel/Makefile.tmp && mv kernel/Makefile.tmp kernel/Makefile
            KSU_VERSION=$(expr $(git rev-list --count main) + 37185 2>/dev/null || echo 114514)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          fi

      - name: 🔧 Set up SUSFS
        if: ${{ env.ENABLE_SUSFS == 'true' }}
        run: |
          cd kernel_workspace
          git clone --depth=1 https://github.com/cctv18/susfs4oki.git susfs4ksu -b oki-android15-6.6
          wget https://raw.githubusercontent.com/cctv18/oppo_oplus_realme_sm8750/main/other_patch/69_hide_stuff.patch -O ./common/69_hide_stuff.patch
          cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch ./common/
          cp ./susfs4ksu/kernel_patches/fs/* ./common/fs/
          cp ./susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
          cd ./common
          patch -p1 < 50_add_susfs_in_gki-android15-6.6.patch || true
          patch -p1 -N -F 3 < 69_hide_stuff.patch || true

      - name: 🔧 Set gki_defconfig
        run: |
          cd kernel_workspace
          echo "CONFIG_KSU=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KPM=y" >> ./common/arch/arm64/configs/gki_defconfig
          if [ "${{ env.KSU_TYPE }}" == 'ReSukiSU' ]; then
            echo 'CONFIG_KSU_FULL_NAME_FORMAT="%TAG_NAME%-%COMMIT_SHA%-Re-TG@qdykernel"' >> ./common/arch/arm64/configs/gki_defconfig
          fi
          if [ "${{ env.ENABLE_SUSFS }}" == 'true' ]; then
            echo "CONFIG_KSU_SUSFS=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> ./common/arch/arm64/configs/gki_defconfig
          fi
          echo "CONFIG_TMPFS_XATTR=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> ./common/arch/arm64/configs/gki_defconfig
          sudo sed -i 's/check_defconfig//' ./common/build.config.gki

      - name: 🔧 Set Kernel name
        run: |
          cd kernel_workspace
          ESCAPED_SUFFIX=$(printf '%s\n' "$DEFAULT_SUFFIX" | sed 's:[\/&]:\\&:g')
          sudo sed -i "s/-4k/$ESCAPED_SUFFIX/g" ./common/arch/arm64/configs/gki_defconfig
          sed -i 's/${scm_version}//' ./common/scripts/setlocalversion

      - name: 🔧 Apply Sched Patch
        run: |
          if [ "$SCHED_FILE" = "none" ]; then
            echo "该机型自带风驰，跳过所有补丁应用"
          elif [ "${{ env.ENABLE_SCX }}" = "true" ]; then
            cd kernel_workspace/common
            if [ "${DEVICES_NAME}" = "oneplus_ace5_ultra" ] || [ "${DEVICES_NAME}" = "realme_GT7" ]; then
              git clone https://github.com/Numbersf/SCHED_PATCH.git -b "mt6991"
            else
              git clone https://github.com/Numbersf/SCHED_PATCH.git -b "sm8750"
            fi
            cp ./SCHED_PATCH/fengchi_${{env.SCHED_FILE}}.patch ./
            if [[ -f "fengchi_${{env.SCHED_FILE}}.patch" ]]; then
              dos2unix "fengchi_${{env.SCHED_FILE}}.patch"
              patch -p1 -F 3 < "fengchi_${{env.SCHED_FILE}}.patch"
            else
              echo "❌ 未匹配到补丁"
              exit 11
            fi
          else
            cd kernel_workspace/common
            sed -i '1iobj-y += hmbird_patch.o' drivers/Makefile
            cp "${GITHUB_WORKSPACE}/.github/workflows/tools/hmbird_patch.patch" ./hmbird_patch.patch
            patch -p1 -F 3 < hmbird_patch.patch
          fi

      - name: 📥 Start build timer
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      # ========== 完整内核编译步骤 ==========
      - name: 🔨 Build Kernel
        run: |
          WORKDIR="$(pwd)"
          export PATH="/usr/lib/ccache:$PATH"
          export PATH="$WORKDIR/kernel_workspace/clang18/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          CLANG_DIR="$WORKDIR/kernel_workspace/clang18/bin"
          CLANG_VERSION="$($CLANG_DIR/clang --version | head -n 1)"
          LLD_VERSION="$($CLANG_DIR/ld.lld --version | head -n 1)"
          pahole_version=$(pahole --version 2>/dev/null | head -n1); [ -z "$pahole_version" ] && echo "pahole版本：未安装" || echo "pahole版本：$pahole_version"
          export CCACHE_LOGFILE="${{ github.workspace }}/kernel_workspace/ccache.log"
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_NOHARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="3G"
          export CCACHE_IS_KERNEL_COMPILING="true"
          echo "sloppiness = file_stat_matches,include_file_ctime,include_file_mtime,pch_defines,file_macro,time_macros" >> "$CCACHE_DIR/ccache.conf"
          cd kernel_workspace/common
          wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/lib/libfakestat.so
          wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/lib/libfaketimeMT.so
          chmod 777 ./*.so
          export FAKESTAT="2025-05-25 12:00:00"
          export FAKETIME="@2025-05-25 13:00:00"
          echo "FAKESTAT=$FAKESTAT" >> $GITHUB_ENV
          echo "FAKETIME=$FAKETIME" >> $GITHUB_ENV
          SO_DIR=$(pwd)
          export PRELOAD_LIBS="$SO_DIR/libfakestat.so $SO_DIR/libfaketimeMT.so"
          echo '#!/bin/bash' > cc-wrapper
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> cc-wrapper
          echo 'export FAKESTAT="'$FAKESTAT'"' >> cc-wrapper
          echo 'export FAKETIME="'$FAKETIME'"' >> cc-wrapper
          echo 'ccache clang "$@"' >> cc-wrapper
          echo '#!/bin/bash' > ld-wrapper
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> ld-wrapper
          echo 'export FAKESTAT="'$FAKESTAT'"' >> ld-wrapper
          echo 'export FAKETIME="'$FAKETIME'"' >> ld-wrapper
          echo 'ld.lld "$@"' >> ld-wrapper
          echo '#!/bin/bash' > test-wrapper.sh
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> test-wrapper.sh
          echo 'export FAKESTAT="'$FAKESTAT'"' >> test-wrapper.sh
          echo 'export FAKETIME="'$FAKETIME'"' >> test-wrapper.sh
          echo 'echo ">>> Wrapper 内部环境检查完毕."' >> test-wrapper.sh
          echo 'exec "$@"' >> test-wrapper.sh
          chmod +x test-wrapper.sh
          ./test-wrapper.sh date
          ./test-wrapper.sh stat ./Makefile
          chmod +x cc-wrapper ld-wrapper
          LD_PRELOAD=$PRELOAD_LIBS stat ./Makefile
          export KBUILD_BUILD_TIMESTAMP="${KERNEL_TIME}"
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error gki_defconfig &&
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="$(pwd)/cc-wrapper" LD="$(pwd)/ld-wrapper" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error Image
          LD_PRELOAD=$PRELOAD_LIBS stat ./Makefile
          echo "ccache状态："
          ccache -s

      - name: 🕒 Calculate build time
        run: |
          END=$(date +%s)
          TIME=$((END - BUILD_START))
          echo "BUILD_TIME=$TIME" >> $GITHUB_ENV
          echo "Build time: $TIME seconds"

      - name: 📥 Save ccache if needed
        if: ${{ env.BUILD_TIME > 480 || steps.ccache-restore.outputs.cache-matched-key == '' }}
        uses: actions/cache/save@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-ECS-${{ env.KSU_TYPE }}-${{ env.DEVICES_NAME }}-${{ github.run_id }}

      - name: 🧹 Clean old ccache
        if: env.BUILD_TIME > 480
        uses: actions/github-script@v8
        env:
          PREFIX: ccache-ECS-${{ env.KSU_TYPE }}-${{ env.DEVICES_NAME }}-
          CURRENT_KEY: ccache-ECS-${{ env.KSU_TYPE }}-${{ env.DEVICES_NAME }}-${{ github.run_id }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const prefix = process.env.PREFIX;
            const currentKey = process.env.CURRENT_KEY;
            let page = 1;
            let deleted = 0;
            while (true) {
              const response = await github.rest.actions.getActionsCacheList({ owner, repo, per_page: 100, page });
              const caches = response.data.actions_caches || [];
              if (caches.length === 0) break;
              for (const cache of caches) {
                if (cache.key.startsWith(prefix) && cache.key !== currentKey) {
                  core.info(`Deleting cache: ${cache.key}`);
                  await github.rest.actions.deleteActionsCacheById({ owner, repo, cache_id: cache.id });
                  deleted++;
                }
              }
              if (caches.length < 100) break;
              page++;
            }
            core.info(`删除 ${deleted} 个旧缓存`);

      # ========== 恢复原始打包逻辑（无 working-directory） ==========
      - name: 📦 Make AnyKernel3 (创建Anykernel3)
        run: |
          cp "${GITHUB_WORKSPACE}/.github/workflows/tools/main.bin" ./
          chmod +x main.bin
          ./main.bin "make_anykernel3"
          rm -rf ./main.bin
          
      - name: 📤 Upload AnyKernel3 (上传 Anykernel3)
        uses: actions/upload-artifact@v5
        with:
         name: AK3_${{ env.KSUVER }}_${{ env.DEVICES_NAME }}_${{ env.KSU_TYPE }}
         path: ./AnyKernel3/*

  upload_rekernel:
    name: Upload Re-Kernel Module
    if: ${{ github.event.inputs.enable_ReKernel == 'true' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 🔎 Find Re-Kernel module zip
        id: download-rekernel
        uses: actions/github-script@v8
        env:
          KERNEL_MAJOR: "6.6"
        with:
          script: |
            const owner = 'Sakion-Team', repo = 'Re-Kernel';
            const release = await github.rest.repos.getLatestRelease({ owner, repo });
            const pattern66 = new RegExp(`^Re-Kernel-v([\\d.]+)-6\\.6\\.zip$`);
            let target = null, ver = '';
            for (const asset of release.data.assets || []) {
              const m = asset.name.match(pattern66);
              if (m) { target = asset; ver = m[1]; break; }
            }
            if (!target) {
              for (const asset of release.data.assets || []) {
                if (/^Re-Kernel.*\.zip$/i.test(asset.name)) { target = asset; ver = 'latest'; break; }
              }
            }
            if (!target) core.setFailed('未找到 Re-Kernel 模块');
            core.setOutput('asset-name', target.name);
            core.setOutput('download-url', target.browser_download_url);
            core.setOutput('version-number', ver);

      - name: 📥 Download Re-Kernel module
        env:
          ASSET_NAME: ${{ steps.download-rekernel.outputs.asset-name }}
          DOWNLOAD_URL: ${{ steps.download-rekernel.outputs.download-url }}
          VERSION_NUMBER: ${{ steps.download-rekernel.outputs.version-number }}
        run: |
          aria2c -s16 -x16 -k1M "$DOWNLOAD_URL" -o "$ASSET_NAME"
          mkdir -p "Re-Kernel-v${VERSION_NUMBER}"
          unzip -q "$ASSET_NAME" -d "Re-Kernel-v${VERSION_NUMBER}"

      - name: 📤 Upload Re-Kernel module
        uses: actions/upload-artifact@v5
        with:
          name: Re-Kernel-v${{ steps.download-rekernel.outputs.version-number }}
          path: Re-Kernel-v${{ steps.download-rekernel.outputs.version-number }}

  create_release:
    name: 🚀 Publish GitHub Release
    needs: [build, upload_rekernel]
    runs-on: ubuntu-latest
    if: ${{ ! failure() && ! cancelled() }}
    steps:
      - name: ⬇️ Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: 📋 Prepare release info
        id: release-info
        env:
          DEVICE: ${{ github.event.inputs.device_name }}
          KSU: ${{ github.event.inputs.ksu_type }}
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d%H%M%S')
          TAG="${DEVICE}-${KSU}-${TIMESTAMP}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "release_name=${DEVICE} - ${KSU} (Build ${TIMESTAMP})" >> $GITHUB_OUTPUT

      - name: 🚀 Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-info.outputs.tag }}
          name: ${{ steps.release-info.outputs.release_name }}
          body: |
            ### 构建详情
            - **设备**: ${{ github.event.inputs.device_name }}
            - **KSU 类型**: ${{ github.event.inputs.ksu_type }}
            - **SUSFS**: ${{ github.event.inputs.enable_susfs }}
            - **Re-Kernel**: ${{ github.event.inputs.enable_ReKernel }}
            - **构建分支**: ${{ github.ref_name }}
            - **运行编号**: ${{ github.run_id }}
          files: |
            release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}