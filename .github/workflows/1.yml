name: Test Droidspaces Patches (补丁测试专用)

on:
  workflow_dispatch:
    inputs:
      device_name:
        description: "📝 选择机型（用于下载对应内核源码）"
        required: true
        type: choice
        options:
          - 'oneplus_ace5_pro'
          - 'oneplus_13'
          - 'oneplus_ace_6'
          - 'oneplus_13t'
          - 'oneplus_pad_2_pro'
          - 'oneplus_ace5_ultra'
          - 'realme_GT7'
          - 'realme_GT7pro'
          - 'realme_GT7pro_Speed'
          - 'realme_GT8'
        default: 'oneplus_ace5_pro'

jobs:
  test-patches:
    runs-on: ubuntu-latest
    steps:
      - name: ⚙️ Set REPO_MANIFEST
        run: |
          case "${{ github.event.inputs.device_name }}" in
            oneplus_ace5_pro) echo "REPO_MANIFEST=sm8750_b_16.0.0_oneplus_ace5_pro" >> $GITHUB_ENV ;;
            oneplus_13) echo "REPO_MANIFEST=sm8750_b_16.0.0_oneplus_13" >> $GITHUB_ENV ;;
            oneplus_ace_6) echo "REPO_MANIFEST=sm8750_b_16.0.0_ace_6" >> $GITHUB_ENV ;;
            oneplus_13t) echo "REPO_MANIFEST=sm8750_b_16.0.0_oneplus_13t" >> $GITHUB_ENV ;;
            oneplus_pad_2_pro) echo "REPO_MANIFEST=sm8750_b_16.0.0_pad_2_pro" >> $GITHUB_ENV ;;
            oneplus_ace5_ultra) echo "REPO_MANIFEST=mt6991_b_16.0.0_oneplus_ace5_ultra" >> $GITHUB_ENV ;;
            realme_GT7) echo "REPO_MANIFEST=mt6991_b_16.0.0_oneplus_ace5_ultra" >> $GITHUB_ENV ;;
            realme_GT7pro) echo "IMAGENAME=Image_Rm_GT_7_Pro" >> $GITHUB_ENV ;;
            realme_GT7pro_Speed) echo "IMAGENAME=Image_Rm_GT_7_Pro_Speed" >> $GITHUB_ENV ;;
            realme_GT8) echo "IMAGENAME=Image_Rm_GT_8" >> $GITHUB_ENV ;;
          esac

      - name: 📥 Download Kernel Source
        run: |
          mkdir kernel_test
          cd kernel_test
          if [ "${{ github.event.inputs.device_name }}" = "realme_GT7pro" ] || [ "${{ github.event.inputs.device_name }}" = "realme_GT7pro_Speed" ] || [ "${{ github.event.inputs.device_name }}" = "realme_GT8" ]; then
            wget -q -O common.zip https://github.com/realme-kernel-opensource/realme_GT8-AndroidB-common-source/archive/refs/heads/master.zip
            unzip -q common.zip && mv realme_GT8-AndroidB-common-source-master common
          elif [ "${{ github.event.inputs.device_name }}" = "oneplus_ace5_ultra" ] || [ "${{ github.event.inputs.device_name }}" = "realme_GT7" ]; then
            wget -q -O common.zip https://github.com/OnePlusOSS/android_kernel_oneplus_mt6991/archive/refs/heads/oneplus/${REPO_MANIFEST}.zip
            unzip -q common.zip && mv android_kernel_oneplus_mt6991-oneplus-${REPO_MANIFEST} common
          else
            wget -q -O common.zip https://github.com/OnePlusOSS/android_kernel_common_oneplus_sm8750/archive/refs/heads/oneplus/${REPO_MANIFEST}.zip
            unzip -q common.zip && mv android_kernel_common_oneplus_sm8750-oneplus-${REPO_MANIFEST} common
          fi
          echo "源码已下载到 kernel_test/common"

      - name: 🧪 Test Patches
        run: |
          cd kernel_test/common
          PATCHES=(
            "001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch"
            "001.GKI-below-6.12-fix_sysvipc_kabi_3_4_5.patch"
            "001.GKI-below-6.12-fix_sysvipc_kabi_1_2_3.patch"
          )
          BASE_URL="https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/main/Documentation/resources/kernel-patches/GKI/below-kernel-6.12"
          
          for PATCH_NAME in "${PATCHES[@]}"; do
            echo "======================================"
            echo "正在测试补丁: $PATCH_NAME"
            wget -q -O test.patch "${BASE_URL}/${PATCH_NAME}"
            
            # 尝试模拟应用，若失败则捕获错误
            if patch -p1 --dry-run --ignore-whitespace < test.patch > /dev/null 2>&1; then
              echo "✅ 补丁 $PATCH_NAME 可以干净应用！"
            else
              echo "❌ 补丁 $PATCH_NAME 应用失败，查看详细信息："
              patch -p1 --dry-run --ignore-whitespace < test.patch 2>&1 || true
            fi
            echo ""
            rm -f test.patch
          done